services:

  # ── Core LLM Infrastructure ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      start_period: 20s
      retries: 3

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: change-me-in-production
      # Register all 4 agents as OpenAI-compatible endpoints
      OPENAI_API_BASE_URLS: >
        http://langchain-agent:8000;
        http://devops-ai-assistant:8000;
        http://multi-agent-devops:8000;
        http://langgraph-multiagent:8000
      OPENAI_API_KEYS: "dummy;dummy;dummy;dummy"
    volumes:
      - openwebui_data:/app/backend/data
    ports:
      - "3000:8080"
    depends_on:
      ollama:
        condition: service_healthy

  # ── AI Agent Services ────────────────────────────────────────────────────────
  langchain-agent:
    build:
      context: ../../langchain-agent
    container_name: langchain-agent
    environment:
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8001:8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  devops-ai-assistant:
    build:
      context: ../../devops-ai-assistant
    container_name: devops-ai-assistant
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - devops_vectordb:/app/vectordb
    ports:
      - "8002:8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  multi-agent-devops:
    build:
      context: ../../multi-agent-devops
    container_name: multi-agent-devops
    environment:
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8003:8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  langgraph-multiagent:
    build:
      context: ../../langgraph-multiagent
    container_name: langgraph-multiagent
    environment:
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8004:8000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Observability (llm-monitoring-dashboard) ─────────────────────────────────
  llm-monitoring:
    build:
      context: ../../llm-monitoring-dashboard
    container_name: llm-monitoring
    environment:
      OLLAMA_HOST: http://ollama:11434
      DB_PATH: /app/data/metrics.db
    volumes:
      - llm_monitoring_data:/app/data
    ports:
      - "8005:8000"
    depends_on:
      ollama:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.full.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  ollama_data:
  openwebui_data:
  devops_vectordb:
  llm_monitoring_data:
  grafana_data:
