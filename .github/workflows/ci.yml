name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Validate Ollama manifests
        run: |
          kubectl apply --dry-run=client -f k8s/namespace.yaml
          kubectl apply --dry-run=client -f k8s/ollama/

      - name: Validate OpenWebUI manifests
        run: |
          kubectl apply --dry-run=client -f k8s/openwebui/

  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan Ollama image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ollama/ollama:latest"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

      - name: Scan Open WebUI image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/open-webui/open-webui:main"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Deploy Ollama
        run: |
          kubectl apply -f k8s/ollama/
          kubectl rollout status deployment/ollama -n ai-platform --timeout=300s

      - name: Deploy Open WebUI
        run: |
          kubectl apply -f k8s/openwebui/
          kubectl rollout status deployment/openwebui -n ai-platform --timeout=120s

      - name: Verify health
        run: |
          kubectl wait --for=condition=ready pod -l app=openwebui -n ai-platform --timeout=120s
          kubectl wait --for=condition=ready pod -l app=ollama -n ai-platform --timeout=300s
